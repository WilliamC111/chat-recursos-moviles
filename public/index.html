<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, height=device-height, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Chat para Superhéroes</title>

    <!-- Fuentes optimizadas: preconnect evita bloqueo de render (~355ms de ahorro) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400&family=Lato:wght@300;400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.3.1/css/all.css">

    <!-- Preload de recursos críticos para mejorar LCP -->
    <link rel="preload" href="css/style.css" as="style">
    <link rel="preload" href="js/app.js" as="script">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="js/libs/plugins/mdtoast.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/3.7.0/animate.css">

    <link rel="shortcut icon" type="image/ico" href="img/favicon.ico"/>
    <link rel="manifest" href="manifest.json">

    <!-- Android -->
    <meta name="theme-color" content="#2980b9">

    <!-- IOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ChatHéroes">

    <link rel="apple-touch-icon" href="img/icons/icon-192x192.png">
    <link rel="apple-touch-icon" sizes="152x152" href="img/icons/icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="img/icons/icon-192x192.png">
    <link rel="apple-touch-icon" sizes="167x167" href="img/icons/icon-152x152.png">

    <!-- iPhone X (1125px x 2436px) -->
    <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" href="img/icons-ios/apple-launch-1125x2436.png">
    <!-- iPhone 8, 7, 6s, 6 (750px x 1334px) -->
    <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" href="img/icons-ios/apple-launch-750x1334.png">
    <!-- iPhone 8 Plus, 7 Plus, 6s Plus, 6 Plus (1242px x 2208px) -->
    <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3)" href="img/icons-ios/apple-launch-1242x2208.png">
    <!-- iPhone 5 (640px x 1136px) -->
    <link rel="apple-touch-startup-image" media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2)" href="img/icons-ios/apple-launch-640x1136.png">

</head>
<body>

    <!-- ═══ BANNER DE INSTALACIÓN PWA ═══════════════════════════════════════ -->
    <div id="install-banner" style="display:none; background:#2980b9; color:#fff;
        padding:10px 16px; align-items:center; justify-content:space-between;
        position:fixed; bottom:0; left:0; right:0; z-index:9999;
        gap:10px; box-shadow:0 -2px 8px rgba(0,0,0,0.2);">
        <span style="font-size:14px;">📲 ¡Instala la app en tu dispositivo!</span>
        <button id="install-btn" style="background:#fff; color:#2980b9; border:none;
            padding:7px 16px; border-radius:6px; cursor:pointer;
            font-weight:600; font-size:13px;">Instalar</button>
    </div>
    <!-- ═══ FIN BANNER ═══════════════════════════════════════════════════════ -->

    <!-- Titulo -->
    <span class="first">
        <span id="salir-btn" class="fa fa-sign-out-alt out oculto animated fadeIn"></span>
        <span id="titulo">
            <i class="fa fa-user"></i>
            Seleccione Personaje
        </span>
        <span id="nuevo-btn" class="fa fa-pen-square new oculto animated fadeIn fast"></span>
    </span>
    <!-- Fin Titulo -->

    <!-- Modal -->
    <div id="modal" class="oculto">
        <img id="modal-avatar" src="img/avatars/spiderman.jpg" width="60" height="60" alt="avatar">

        <span class="first">
            <span id="titulo-modal">Nuevo mensaje</span>
            <span id="cancel-btn" class="fa fa-times"></span>
        </span>

        <div class="nuevo-mensaje">
            <textarea id="txtMensaje" placeholder="Nuevo mensaje..." rows="5"></textarea>

            <div class="camara-contenedor fadeIn fast oculto" align="center">
                <video id="player" autoplay style="height: 300px;"></video>
                <button id="tomar-foto-btn">
                    <i class="fa fa-camera"></i>
                    Tomar Foto
                </button>
            </div>
        </div>

        <!-- botones de acción -->
        <div id="post-btn" class="fab">
            <i class="fa fa-paper-plane"></i>
        </div>
        <div id="location-btn" class="fab-marker">
            <i class="fa fa-map-marker-alt"></i>
        </div>
        <div id="photo-btn" class="fab-photo">
            <i class="fa fa-camera"></i>
        </div>
    </div>
    <!-- Fin Modal -->


    <!-- Seleccion de personaje -->
    <div id="seleccion" class="seleccion animated fadeIn fast" align="center">

        <!-- Botón de notificaciones -->
        <button class="oculto btn-noti-activadas">Notificaciones Activadas</button>
        <button class="oculto btn-noti-desactivadas">Notificaciones Desactivadas</button>
        <!-- Fin de boton de notificaciones -->

        <!-- width y height en cada imagen previene CLS (layout shifts) -->
        <div>
            <img data-user="spiderman" src="img/avatars/spiderman.jpg"
                 alt="spiderman" class="seleccion-avatar" width="100" height="100">
        </div>
        <div>
            <img data-user="ironman" src="img/avatars/ironman.jpg"
                 alt="ironman" class="seleccion-avatar" width="100" height="100">
        </div>
        <div>
            <img data-user="wolverine" src="img/avatars/wolverine.jpg"
                 alt="wolverine" class="seleccion-avatar" width="100" height="100">
        </div>
        <div>
            <img data-user="thor" src="img/avatars/thor.jpg"
                 alt="thor" class="seleccion-avatar" width="100" height="100">
        </div>
        <div>
            <img data-user="hulk" src="img/avatars/hulk.jpg"
                 alt="hulk" class="seleccion-avatar" width="100" height="100">
        </div>

    </div>
    <!-- FIN Seleccion de personaje -->

    <!-- Lista de mensajes -->
    <ul id="timeline" class="timeline oculto"></ul>
    <!-- Fin Lista de mensajes -->


    <!-- Scripts: jQuery y plugins primero, luego app -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="js/libs/plugins/mdtoast.min.js"></script>
    <script src="js/camara-class.js" defer></script>
    <script src="js/app.js" defer></script>

    <!-- ═══ WEB VITALS RUM + INSTALACIÓN PWA ════════════════════════════════ -->
    <script type="module">
        import { onLCP, onINP, onCLS }
            from 'https://unpkg.com/web-vitals@4/dist/web-vitals.attribution.js';

        /* ── IndexedDB: guarda métricas RUM ─────────────────────────────── */
        const DB_NAME = 'rum-vitals';
        const STORE   = 'metrics';

        function abrirDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, 1);
                req.onupgradeneeded = e =>
                    e.target.result.createObjectStore(STORE, { autoIncrement: true });
                req.onsuccess = e => resolve(e.target.result);
                req.onerror   = e => reject(e.target.error);
            });
        }

        async function guardarMetrica(m) {
            console.log(
                `%c[RUM] ${m.name}`,
                'color:#2980b9; font-weight:bold',
                `${m.value.toFixed(1)} ms | rating: ${m.rating}`
            );
            try {
                const db = await abrirDB();
                const tx = db.transaction(STORE, 'readwrite');
                tx.objectStore(STORE).add({
                    name:   m.name,
                    value:  m.value,
                    rating: m.rating,       
                    url:    location.href,
                    ts:     new Date().toISOString()
                });
            } catch (err) {
                console.warn('[RUM] No se pudo guardar en IndexedDB:', err);
            }
        }

        // Registra las 3 métricas clave de CWV
        onLCP(guardarMetrica);   // Largest Contentful Paint
        onINP(guardarMetrica);   // Interaction to Next Paint
        onCLS(guardarMetrica);   // Cumulative Layout Shift

        /* ── Banner de instalación PWA ──────────────────────────────────── */
        let deferredPrompt;
        const banner     = document.getElementById('install-banner');
        const installBtn = document.getElementById('install-btn');

        // El navegador lanza este evento cuando la PWA cumple los criterios
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            banner.style.display = 'flex';
            console.log('[PWA] Criterios de instalación cumplidos ✓');
        });

        installBtn.addEventListener('click', () => {
            banner.style.display = 'none';
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(r => {
                console.log('[PWA] Resultado de instalación:', r.outcome);
                deferredPrompt = null;
            });
        });

        window.addEventListener('appinstalled', () => {
            banner.style.display = 'none';
            console.log('[PWA] App instalada exitosamente 🎉');
        });
    </script>
    <!-- ═══ FIN WEB VITALS ══════════════════════════════════════════════════ -->

</body>
</html>
